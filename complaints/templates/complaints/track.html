<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Complaint</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.08);
        }
        .btn-track {
            background: #17a2b8;
            border: none;
            border-radius: 30px;
            padding: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-info" href="/">🔍 Track Complaint</a>
            <a href="{% url 'home' %}" class="btn btn-outline-secondary btn-sm rounded-pill">← Home</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card p-4">
                    <h4 class="text-center mb-3">Check Your Complaint Status</h4>
                    {% if error %}
                        <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">Enter Complaint ID</label>
                            <input type="text" name="complaint_id" class="form-control form-control-lg" placeholder="e.g., 1" required>
                        </div>
                        <button type="submit" class="btn btn-track w-100 text-white">View Status</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
